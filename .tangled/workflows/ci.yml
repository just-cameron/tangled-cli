# CI Pipeline - Run linting, type checking, and tests on all pushes
#
# This pipeline ensures code quality by running checks on every push to any branch.

when:
  - event: ["push", "manual"]
    branch: ["*"]

engine: nixery

# Clone repository to get all source files
# using the default values
clone:
  skip: false
  depth: 1
  submodules: false

dependencies:
  nixpkgs:
    - nodejs_22
    - biome

environment:
  NODE_ENV: "test"

steps:
  - name: "Install dependencies"
    command: "npm ci"

  - name: "Run linting"
    command: "biome check ."

  - name: "Run type checking"
    command: "npm run typecheck"

  - name: "Run tests"
    command: "npm test"
