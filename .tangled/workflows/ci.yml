# Canonical Tangled CI. Keep this aligned with `bun run check`; GitHub Actions
# exists for cross-platform release artifacts, not as the source CI surface.

when:
  - event: ["push", "manual"]
    branch: ["*"]

engine: nixery

# Clone repository to get all source files
# using the default values
clone:
  skip: false
  depth: 1
  submodules: false

dependencies:
  nixpkgs:
    - nodejs_22
    - bun
    - biome

environment:
  NODE_ENV: "test"

steps:
  - name: "Install dependencies"
    command: "bun install --frozen-lockfile"

  - name: "Run checks"
    command: "bun run check"

  - name: "Build npm package"
    command: "bun run build"

  - name: "Build and smoke-test binary"
    command: |
      bun run build:binary -- --output artifacts/tang-linux-x64
      ./artifacts/tang-linux-x64 --version
      ./artifacts/tang-linux-x64 --help >/dev/null
